name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npx tsc -b

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npx vite build

      # Railway auto-deploys from the main branch via GitHub integration.
      # This workflow ensures the build passes before Railway picks it up.
      # To enable direct deploy, add RAILWAY_TOKEN secret and uncomment:
      # - name: Deploy to Railway
      #   uses: bervProject/railway-deploy@main
      #   with:
      #     railway_token: ${{ secrets.RAILWAY_TOKEN }}
      #     service: lancelot
